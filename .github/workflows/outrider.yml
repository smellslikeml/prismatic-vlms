name: Outrider Kimi-K3 smoke (prismatic-vlms → TIPSv2 backbone)

# One-shot dispatch pattern (adapted from smellslikeml/ag2's
# outrider-moonshot-refine-smoke.yml). No cron, single job, Moonshot Kimi-K3
# routing. Interest-id resolves to the "training vlms" ResearchInterest
# for smellslikeml/prismatic-vlms.

on:
  workflow_dispatch:
    inputs:
      pin-arxiv:
        description: 'arxiv_id (bypasses selection).'
        required: false
        default: '2604.12012'
      start-from-ref:
        description: 'Branch/tag/SHA to start from (default: main).'
        required: false
        default: 'main'

concurrency:
  group: outrider-kimi-k3-smoke-prismatic-vlms
  cancel-in-progress: false

jobs:
  recommend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: remyxai/outrider@e975a5b000af9fd5cf4e210dffbc39aa8f2717e5 # v1
        env:
          REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
        with:
          interest-id: 0ca7c0e0-3c5f-4cc1-b996-2b30f862c4a9  # auto-created "prismatic-vlms" interest (provisioned via `remyxai outrider init --mode auto`)
          mode: recommend
          publish: pr
          provider: moonshot
          model: kimi-k3
          pin-arxiv: ${{ inputs.pin-arxiv }}
          start-from-ref: ${{ inputs.start-from-ref }}
          lead-content: |
            # Add TIPSv2 as a vision backbone in prismatic-vlms

            ## Goal

            Add TIPSv2 (Google DeepMind, arxiv 2604.12012, CVPR 2026) as a new vision backbone alongside existing `clip_vit`, `siglip_vit`, `dinov2_vit`, `dinosiglip_vit` options. TIPSv2 is a text-image encoder with dense patch supervision via iBOT++ — spatially-aware alternative to SigLIP for VLM training on tasks needing dense/grounding capabilities.

            ## Reference material (READ FIRST before writing code)

            - Paper: https://arxiv.org/abs/2604.12012 (TIPSv2, CVPR 2026)
            - **`transformers` integration (MERGED 2026-07-07)**: https://github.com/huggingface/transformers/pull/46347 — TIPSv2 is now a first-class model in the `transformers` library. **This is the loading path to use.**
            - HF model IDs (all four exist as HF repos):
              - `google/tipsv2-b14` — 86M vision params (edge candidate)
              - `google/tipsv2-l14` — 303M vision params (standard research recommendation)
              - `google/tipsv2-so400m14` — 412M vision params
              - `google/tipsv2-g14` — 1.1B vision params
            - Reference implementation (Apache 2.0, cross-check only): https://github.com/google-deepmind/tips — do NOT port arch code from here since transformers already ships it

            ## Loading path — critical, don't guess

            TIPSv2 is `transformers`-native as of 2026-07-07 (PR #46347). Load via:

            ```python
            from transformers import AutoModel, AutoImageProcessor
            model = AutoModel.from_pretrained("google/tipsv2-l14")
            processor = AutoImageProcessor.from_pretrained("google/tipsv2-l14")
            ```

            Do NOT:
            - Call `timm.create_model("tipsv2_...")` — TIPSv2 is not in TIMM
            - Download `.npz` files from `storage.googleapis.com/tips_data/` — conversion is now done inside `transformers`
            - Port model definitions from `google-deepmind/tips/pytorch/` — the arch is already in `transformers.models.tipsv2`

            The vision tower is `Tipsv2VisionModel` (per merged PR). It exposes `image_embeds`, `patch_tokens`, `register_tokens`. For prismatic-vlms's dense-patch VLM use, `patch_tokens` is the target output. Pull the `Tipsv2VisionModel.forward` signature from `src/transformers/models/tipsv2/modeling_tipsv2.py` before wrapping.

            **Transformers version requirement**: PR #46347 merged into `main` on 2026-07-07. The wrapping code needs `transformers` version that includes this. Check the current `setup.py` / `pyproject.toml` transformers pin. If older than the release containing #46347, bump the requirement. Prefer the minimum bump that works.

            ## Files

            Add:
            - `prismatic/models/backbones/vision/tipsv2_vit.py` — new backbone class inheriting from `base_vision.py`. Wraps `transformers.Tipsv2VisionModel`, adapts `patch_tokens` output to the interface expected by the VLM training loop.

            Modify:
            - `prismatic/models/backbones/vision/__init__.py` — export the new backbone
            - Backbone registry (search for where `siglip-vit-l16` / equivalent identifiers are registered) — add entries for `tipsv2-vit-l14` and `tipsv2-vit-b14`
            - `setup.py` or `pyproject.toml` — bump `transformers` pin if needed to include PR #46347

            Pattern-match against `siglip_vit.py` (closest analog — Google text-image encoder). SigLIP loads via TIMM; TIPSv2 loads via transformers `AutoModel`. The backbone class INTERFACE (`get_image_transform`, `default_image_resolution`, `embed_dim`) should match; only the internal `_load_backbone` / equivalent method differs.

            ## Sizes to support in this PR

            - `tipsv2-vit-l14` (303M vision, HF id `google/tipsv2-l14`) — REQUIRED
            - `tipsv2-vit-b14` (86M vision, HF id `google/tipsv2-b14`) — REQUIRED

            Skip SO/14 and G/14 for this PR — follow-up if L/14 lands.

            Native input resolution range is 224–1792 (patch size 14). Default to 224 or 336 to match other backbones' precedent.

            Embed dims:
            - B/14: `embed_dim=768` (standard ViT-B)
            - L/14: `embed_dim=1024` (standard ViT-L)

            Patch counts (patch 14):
            - 224 input: 256 patches
            - 336 input: 576 patches

            Confirm via the merged `transformers` config for `google/tipsv2-{b14,l14}` before relying on these numbers.

            ## Testing

            Add a minimal test in the same style as existing backbone tests (search for `test_*_backbone.py`, `test_vision_backbone.py`, or similar — pattern-match SigLIP tests). Verify only:

            - Backbone instantiates from registry name (`tipsv2-vit-l14`, `tipsv2-vit-b14`)
            - Forward pass on a fake `(1, 3, 224, 224)` (or matching resolution) input returns tensor of expected `(batch, num_patches, embed_dim)` shape

            Do NOT download the actual `google/tipsv2-*` checkpoints in tests — use `from_config(config)` random-init OR skip-if-offline. Follow existing test precedent for network-dependence.

            ## Non-goals

            - Do NOT port model architecture code from `google-deepmind/tips/pytorch/` — already in transformers
            - Do NOT integrate `tipsv2_dpt` (depth-estimation head shipped in the same PR) — different scope, follow-up
            - Do NOT modify `base_vision.py`
            - Do NOT change existing backbones' behavior
            - Do NOT add multi-encoder fusion (like `dinosiglip`) combining TIPSv2 with anything — follow-up PR
            - Do NOT port the text encoder — VLM use case only needs the vision tower
            - Do NOT scaffold for hypothetical future callers

            ## PR narrative pointers

            When drafting the PR description:
            - Frame as "spatially-aware backbone option for VLM training", calling out TIPSv2's ADE150 zero-shot seg 24.7 mIoU (L/14) vs SigLIP's ~11–13 as motivation
            - Reference the paper's iBOT++ objective as the source of the dense-patch advantage
            - Note transformers PR #46347 as the loading dependency (with version bump if applicable)
            - Multi-encoder fusion story (TIPSv2 + DINOv3, TIPSv2 + SigLIP) is out of scope but naturally follows

            Goal is a PR. Fidelity audit routes to Issue when new code has no call site — the minimum wiring to clear it is the __init__ export + a shape-check pytest that constructs the backbone from its registry name.
          staged-synthesis: 'true'
          claude-timeout: '3600'
          rate-limit-days: '0'
