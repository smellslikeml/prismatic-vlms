name: Outrider

# Generated by `remyx outrider init`.
#
# Outrider scouts arXiv for your repo and opens draft PRs wiring the
# next paper into an existing call site. See:
#   https://github.com/remyxai/outrider
#
# Secrets needed (set automatically by `remyx outrider init`):
#   REMYX_API_KEY     — engine.remyx.ai token
#   ANTHROPIC_API_KEY — Anthropic console token (for Claude Code)

on:
  schedule:
    - cron: '0 14 * * 1'   # Mondays 14:00 UTC; pick any cadence
  workflow_dispatch:

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: remyxai/outrider@v1
        with:
          interest-id: ecd07323-c7e0-4bb3-aa07-9feab60173d8
